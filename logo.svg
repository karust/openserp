  <text x="640" y="86" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="-2.5"><tspan fill="#E84B3C">O</tspan><tspan fill="#3D85F0">p</tspan><tspan fill="#E84B3C">e</tspan><tspan fill="#F2B22A">n</tspan><tspan fill="#2BB673">S</tspan><tspan fill="#E84B3C">E</tspan><tspan fill="#3D85F0">R</tspan><tspan fill="#E84B3C">P</tspan></text>

  
