name: Feature request
description: Suggest an OpenSERP improvement that is not engine-specific.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
      placeholder: "It is hard to ..."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, CLI, or documentation change you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or smaller versions have you considered?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - API
        - docs
        - parser
        - proxy
        - captcha
        - resilience
        - tests
        - other
    validations:
      required: true
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this.
